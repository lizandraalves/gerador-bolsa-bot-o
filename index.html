<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Ficha Técnica — Bolsa Botão PVC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a1a;
    --paper: #f5f0e8;
    --accent: #c8402a;
    --rule: #bfb8a8;
    --muted: #7a7060;
    --panel: #ede8dc;
    --white: #ffffff;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    border-bottom: 2px solid var(--ink);
    padding: 1.2rem 2rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  header span {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .workspace { display: flex; flex: 1; }

  .controls {
    width: 280px;
    min-width: 280px;
    border-right: 2px solid var(--ink);
    padding: 1.5rem;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
    overflow-y: auto;
  }

  .section-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .field-group { display: flex; flex-direction: column; gap: 0.8rem; }
  .field { display: flex; flex-direction: column; gap: 0.3rem; }

  label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .input-wrap {
    display: flex;
    align-items: center;
    border: 1.5px solid var(--ink);
    background: var(--white);
  }

  .input-wrap input {
    flex: 1;
    border: none;
    outline: none;
    padding: 0.45rem 0.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    background: transparent;
    color: var(--ink);
    width: 100%;
  }

  .unit {
    padding: 0.45rem 0.6rem;
    font-size: 0.65rem;
    color: var(--muted);
    border-left: 1px solid var(--rule);
    white-space: nowrap;
  }

  .divider { height: 1px; background: var(--rule); }

  .toggle-group { display: flex; flex-direction: column; gap: 0.5rem; }

  .toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    font-size: 0.72rem;
    color: var(--ink);
  }

  .toggle input[type="checkbox"] {
    width: 14px; height: 14px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .btn-group { display: flex; flex-direction: column; gap: 0.5rem; margin-top: auto; }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.65rem 1rem;
    border: 2px solid var(--ink);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    background: transparent;
    color: var(--ink);
  }

  .btn:hover { background: var(--ink); color: var(--white); }

  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--white);
  }
  .btn.primary:hover { background: #a8311e; border-color: #a8311e; }

  .canvas-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem;
    overflow: auto;
  }

  #svg-container {
    background: var(--white);
    border: 1px solid var(--rule);
    box-shadow: 4px 4px 0 var(--rule);
    display: inline-block;
    max-width: 100%;
  }

  #svg-container svg { display: block; max-width: 100%; height: auto; }

  .info-bar {
    width: 100%;
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1rem;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .info-bar span b { color: var(--ink); font-weight: 500; }

  /* ── PDF / PRINT ─────────────────────────────────────────────────────── */
  @media print {
    @page { margin: 10mm; size: auto; }
    body * { visibility: hidden !important; }
    #svg-container,
    #svg-container * { visibility: visible !important; }
    #svg-container {
      position: static !important;
      display: block !important;
      box-shadow: none !important;
      border: none !important;
      background: white !important;
      width: 100% !important;
    }
    #svg-container svg {
      width: 100% !important;
      height: auto !important;
      max-width: 100% !important;
    }
  }
</style>
</head>
<body>

<header>
  <h1>Bolsa Botão PVC</h1>
  <span>Gerador de Ficha Técnica</span>
</header>

<div class="workspace">

  <aside class="controls">

    <div>
      <div class="section-label">Medidas da Bolsa</div>
      <div class="field-group">
        <div class="field">
          <label>Largura</label>
          <div class="input-wrap">
            <input type="number" id="largura" value="20" min="5" max="200" step="0.5">
            <span class="unit">cm</span>
          </div>
        </div>
        <div class="field">
          <label>Altura</label>
          <div class="input-wrap">
            <input type="number" id="altura" value="20" min="5" max="200" step="0.5">
            <span class="unit">cm</span>
          </div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">Aba / Tampa</div>
      <div class="field-group">
        <div class="field">
          <label>Altura da Aba</label>
          <div class="input-wrap">
            <input type="number" id="aba-altura" value="6" min="2" max="30" step="0.5">
            <span class="unit">cm</span>
          </div>
        </div>
        <div class="field">
          <label>Recuo lateral (topo)</label>
          <div class="input-wrap">
            <input type="number" id="aba-recuo" value="2" min="0" max="10" step="0.1">
            <span class="unit">cm</span>
          </div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">Botão de Pressão</div>
      <div class="field-group">
        <div class="field">
          <label>Diâmetro do furo</label>
          <div class="input-wrap">
            <input type="number" id="furo" value="1.2" min="0.3" max="5" step="0.1">
            <span class="unit">cm</span>
          </div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">Informações da Ficha</div>
      <div class="field-group">
        <div class="field">
          <label>Referência / Código</label>
          <div class="input-wrap">
            <input type="text" id="ref" value="BB-001" style="font-size:0.85rem;">
          </div>
        </div>
        <div class="field">
          <label>Material</label>
          <div class="input-wrap">
            <input type="text" id="material" value="PVC 0,20mm" style="font-size:0.85rem;">
          </div>
        </div>
        <div class="field">
          <label>Cor</label>
          <div class="input-wrap">
            <input type="text" id="cor" value="Transparente" style="font-size:0.85rem;">
          </div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">Exibir no Desenho</div>
      <div class="toggle-group">
        <label class="toggle"><input type="checkbox" id="show-cotas" checked> Cotas</label>
        <label class="toggle"><input type="checkbox" id="show-info" checked> Bloco de informações</label>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn primary" onclick="gerarSVG()">↻ Atualizar</button>
      <button class="btn" onclick="baixarSVG()">↓ Exportar SVG</button>
      <button class="btn" onclick="baixarPDF()" id="btn-pdf">↓ Exportar PDF</button>
    </div>

  </aside>

  <main class="canvas-area">
    <div class="info-bar" id="info-bar"></div>
    <div id="svg-container"></div>
  </main>

</div>

<script>
// ─── ESCALA ──────────────────────────────────────────────────────────────────
const PX   = 28;       // pixels por centímetro
const MAR  = 70;       // margem ao redor do desenho
const cm   = v => v * PX;

// Constantes visuais para a solda dentilhada
const TOOTH  = 5;   // passo do dente em px
const SOLD_W = 8;   // largura da faixa de solda em px (perpendicular à borda)
const SW      = 1.0; // stroke-width dos dentes



// ─── GERADOR PRINCIPAL ───────────────────────────────────────────────────────
function gerarSVG() {
  const L      = parseFloat(document.getElementById('largura').value)    || 20;
  const H      = parseFloat(document.getElementById('altura').value)     || 20;
  const abaH   = parseFloat(document.getElementById('aba-altura').value) || 6;
  const abaR   = parseFloat(document.getElementById('aba-recuo').value) ?? 2;
  const furo   = parseFloat(document.getElementById('furo').value)       || 1.2;
  const ref    = document.getElementById('ref').value;
  const mat    = document.getElementById('material').value;
  const cor    = document.getElementById('cor').value;
  const showC  = document.getElementById('show-cotas').checked;
  const showI  = document.getElementById('show-info').checked;

  // Dimensões em px
  const bW  = cm(L);
  const bH  = cm(H);
  const aH  = cm(abaH);
  const aRp = cm(abaR);
  const fR  = cm(furo / 2);

  // Espaços extras para cotas e infos
  const cotaL = showC ? 70 : 0;
  const cotaB = showC ? 50 : 0;
  const infoH = showI ? 82 : 0;

  // Origem do corpo (canto superior-esquerdo)
  const ox = MAR + cotaL;
  const oy = MAR + aH + (showC ? 30 : 0);

  // Tamanho total do canvas SVG (em px para o viewBox, em mm para width/height)
  const cotaT = showC ? 30 : 0; // espaço extra no topo para cota da parte superior da aba
  const svgW = bW + 2*MAR + cotaL + (showC ? 50 : 0);
  const svgH = bH + aH + 2*MAR + cotaB + infoH + cotaT;

  // Conversão para mm: garante que o SVG salvo tenha dimensões físicas corretas
  // 1 cm = PX pixels, 1 cm = 10 mm  →  1 px = 10/PX mm
  const toMM = v => (v * 10 / PX).toFixed(4);
  const svgWmm = toMM(svgW);
  const svgHmm = toMM(svgH);

  const cx = ox + bW / 2; // centro horizontal

  // ── Aba: trapézio com lados angulados e chanfros nos cantos do topo
  //   Base inferior: largura total bW (alinhada com o corpo), em y = oy
  //   Topo: largura = bW - 2*aRp, em y = oy - aH
  //   Cantos: chanfro reto diagonal, tamanho proporcional às dimensões da bolsa
  const aTopW  = bW - 2 * aRp;       // largura do topo
  const aTopXL = ox + aRp;           // topo esquerdo
  const aTopXR = ox + bW - aRp;      // topo direito
  const aTopY  = oy - aH;

  // ── Reforços laterais do corpo (pequeno retângulo ao longo do topo do corpo)
  const rfH = aH * 0.45;   // altura do reforço = ~metade da aba
  const rfW = SOLD_W + 4;  // largura do reforço

  // ─────────────────────────────────────────────────────────────────────────
  let s = `<svg xmlns="http://www.w3.org/2000/svg"
    width="${svgWmm}mm" height="${svgHmm}mm" viewBox="0 0 ${svgW} ${svgH}"
    style="background:#fff; font-family:'DM Mono',monospace;">`;

  // Marcadores de seta para cotas (escondido)
  s += `<defs>
    <marker id="arr" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#333"/>
    </marker>
    <marker id="arrR" markerWidth="5" markerHeight="5" refX="1" refY="2.5" orient="auto">
      <path d="M5,0 L0,2.5 L5,5 Z" fill="#333"/>
    </marker>
  </defs>`;

  // ── 1. ABA (TRAPÉZIO COM CHANFROS RETOS NOS CANTOS DO TOPO) ──────────
  // Base inferior: largura total bW (alinhada com o corpo), em y = oy
  // Lados: inclinados, subindo diagonalmente até o topo mais estreito
  // Cantos do topo: chanfro reto diagonal (linha reta — sem curva)
  // O ângulo do chanfro é determinado pela relação aRp (recuo horizontal) / aH (altura)
  const aPath =
    `M ${ox} ${oy}` +                // base esq (alinhada com corpo)
    ` L ${aTopXL} ${aTopY}` +        // diagonal esq direto ao canto do topo (chanfro reto)
    ` L ${aTopXR} ${aTopY}` +        // topo reto
    ` L ${ox + bW} ${oy}` +          // diagonal dir descendo
    ` Z`;                             // fecha (base)

  s += `<path d="${aPath}" fill="none" stroke="#1a1a1a" stroke-width="1.3"/>`;

  // Furo do botão NA ABA (centrado, a ~40% da altura da aba a partir do topo)
  const f1y = aTopY + aH * 0.42;
  s += `<circle cx="${cx}" cy="${f1y}" r="${fR}" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>`;

  // ── 2. CORPO ────────────────────────────────────────────────────────────
  s += `<rect x="${ox}" y="${oy}" width="${bW}" height="${bH}"
    fill="none" stroke="#1a1a1a" stroke-width="1.5"/>`;

  // Furo do botão NO CORPO (centrado, ~1.5cm abaixo da dobra)
  const f2y = oy + Math.max(fR * 2.5, cm(1.0));
  s += `<circle cx="${cx}" cy="${f2y}" r="${fR}" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>`;

  // ── 3. SOLDA DENTILHADA ─────────────────────────────────────────────────
  // Borda ESQUERDA do corpo
  s += soldaVertical(ox, oy, bH, 'left');
  // Borda DIREITA do corpo
  s += soldaVertical(ox + bW, oy, bH, 'right');
  // Borda INFERIOR do corpo
  s += soldaHorizontal(ox, oy + bH, bW, 'bottom');

  // ── 4. REFORÇOS LATERAIS ────────────────────────────────────────────────
  // Retângulo interno em cada lateral, no topo do corpo (dentro do contorno)
  // Esquerdo: começa na borda esquerda e vai para dentro
  s += `<rect x="${ox}" y="${oy}" width="${rfW - 1}" height="${rfH}"
    fill="none" stroke="#1a1a1a" stroke-width="1"/>`;
  // Direito: termina na borda direita e vai para dentro
  s += `<rect x="${ox + bW - rfW + 1}" y="${oy}" width="${rfW - 1}" height="${rfH}"
    fill="none" stroke="#1a1a1a" stroke-width="1"/>`;

  // Linha horizontal dentro do reforço (detalhe)
  const rfMidY = oy + rfH * 0.45;
  s += `<line x1="${ox}" y1="${rfMidY}" x2="${ox + rfW - 1}" y2="${rfMidY}"
    stroke="#1a1a1a" stroke-width="0.8"/>`;
  s += `<line x1="${ox + bW - rfW + 1}" y1="${rfMidY}" x2="${ox + bW}" y2="${rfMidY}"
    stroke="#1a1a1a" stroke-width="0.8"/>`;

  // ── Cota do comprimento da lateral da aba (ao lado da aba, lado esquerdo) ─────
  // Vetor da diagonal esquerda: de (ox, oy) → (aTopXL, aTopY)
  const dxL = aTopXL - ox;
  const dyL = aTopY  - oy;
  const diagLen = Math.sqrt(dxL*dxL + dyL*dyL);
  const diagCm  = (diagLen / PX).toFixed(1); // comprimento real em cm
  // Vetor unitário perpendicular para a esquerda (ao lado da bolsa)
  const perpX = -dyL / diagLen;
  const perpY =  dxL / diagLen;
  // Offset pequeno: cota fica rente à diagonal da aba
  const cotaOffset = 14;
  const cd_x1 = ox     + perpX * cotaOffset;
  const cd_y1 = oy     + perpY * cotaOffset;
  const cd_x2 = aTopXL + perpX * cotaOffset;
  const cd_y2 = aTopY  + perpY * cotaOffset;
  const cd_mx = (cd_x1 + cd_x2) / 2;
  const cd_my = (cd_y1 + cd_y2) / 2;
  const textRot = Math.atan2(dyL, dxL) * 180 / Math.PI;
  const tkLen = 5;
  const tk_dx = perpX * tkLen;
  const tk_dy = perpY * tkLen;

  s += cotaDiagonal(cd_x1, cd_y1, cd_x2, cd_y2, cd_mx, cd_my, textRot, tk_dx, tk_dy, `${diagCm} cm`, '#1a1a1a');

  // ── 5. COTAS ────────────────────────────────────────────────────────────
  if (showC) {
    // Cota largura total (abaixo do corpo)
    s += cotaHoriz(ox, ox + bW, oy + bH + 35, `${L} cm`);
    // Cota largura do topo da aba (acima da aba)
    s += cotaHoriz(aTopXL, aTopXR, aTopY - 20, `${abaR > 0 ? (L - 2*abaR).toFixed(1) : L} cm`, '#1a1a1a', 8.5);
    // Cota altura do corpo (à esquerda)
    s += cotaVert(oy, oy + bH, ox - 45, `${H} cm`);
    // Cota altura da aba (à direita)
    s += cotaVert(aTopY, oy, ox + bW + 32, `${abaH} cm`, '#1a1a1a', 8.5);
    // Cota altura total (mais à esquerda)
    s += cotaVert(aTopY, oy + bH, ox - 68, `${H + abaH} cm`, '#1a1a1a', 9.5, true);
  }

  // ── 6. BLOCO DE INFORMAÇÕES ─────────────────────────────────────────────
  if (showI) {
    const iy = oy + bH + (showC ? 56 : 14);
    const iH = 70;
    const sep = bW / 2;

    s += `<rect x="${ox}" y="${iy}" width="${bW}" height="${iH}"
      fill="#f9f9f9" stroke="#1a1a1a" stroke-width="1"/>`;
    s += `<line x1="${ox+sep}" y1="${iy}" x2="${ox+sep}" y2="${iy+iH}" stroke="#ccc" stroke-width="0.8"/>`;
    s += `<line x1="${ox}" y1="${iy+23}" x2="${ox+bW}" y2="${iy+23}" stroke="#ccc" stroke-width="0.8"/>`;
    s += `<line x1="${ox}" y1="${iy+46}" x2="${ox+bW}" y2="${iy+46}" stroke="#ccc" stroke-width="0.8"/>`;

    const cel = (x, y, lbl, val) =>
      `<text x="${x+5}" y="${y+10}" font-size="7" fill="#888">${lbl}</text>
       <text x="${x+5}" y="${y+20}" font-size="10" fill="#1a1a1a" font-weight="500">${val}</text>`;

    s += cel(ox,      iy,    'REFERÊNCIA',   ref);
    s += cel(ox+sep,  iy,    'MATERIAL',     mat);
    s += cel(ox,      iy+23, 'LARGURA',      `${L} cm`);
    s += cel(ox+sep,  iy+23, 'COR',          cor);
    s += cel(ox,      iy+46, 'ALTURA CORPO', `${H} cm`);
    s += cel(ox+sep,  iy+46, 'ALTURA ABA',   `${abaH} cm`);
  }

  // Título
  s += `<text x="${ox}" y="${MAR * 0.42}"
    font-size="10" fill="#7a7060" letter-spacing="0.08em">FICHA TÉCNICA — BOLSA BOTÃO PVC</text>`;

  s += `</svg>`;

  document.getElementById('svg-container').innerHTML = s;

  document.getElementById('info-bar').innerHTML =
    `<span>Largura: <b>${L} cm</b></span>
     <span>Altura: <b>${H} cm</b></span>
     <span>Aba: <b>${abaH} cm</b></span>
     <span>Total: <b>${H + abaH} cm</b></span>
     <span>Furo botão: <b>∅ ${furo} cm</b></span>`;
}

// ─── SOLDA DENTILHADA ────────────────────────────────────────────────────────
// Vertical: x fixo, percorre de y0 até y0+len
function soldaVertical(x, y0, len, side) {
  const dir = side === 'left' ? 1 : -1; // dente para dentro
  const xi  = x + dir * SOLD_W;         // posição da linha interna
  let d = '';

  // Linha interna paralela (segunda linha da solda)
  d += `<line x1="${xi}" y1="${y0}" x2="${xi}" y2="${y0+len}" stroke="#1a1a1a" stroke-width="${SW}"/>`;

  // Dentes (traços perpendiculares à borda)
  const n = Math.ceil(len / TOOTH);
  for (let i = 0; i <= n; i++) {
    const ty = y0 + i * TOOTH;
    if (ty > y0 + len + 0.5) break;
    const clamp = Math.min(ty, y0 + len);
    d += `<line x1="${x}" y1="${clamp}" x2="${xi}" y2="${clamp}" stroke="#1a1a1a" stroke-width="${SW}"/>`;
  }
  return d;
}

// Horizontal: y fixo, percorre de x0 até x0+len
function soldaHorizontal(x0, y, len, side) {
  const dir = side === 'bottom' ? -1 : 1; // dente para dentro
  const yi  = y + dir * SOLD_W;
  let d = '';

  d += `<line x1="${x0}" y1="${yi}" x2="${x0+len}" y2="${yi}" stroke="#1a1a1a" stroke-width="${SW}"/>`;

  const n = Math.ceil(len / TOOTH);
  for (let i = 0; i <= n; i++) {
    const tx = x0 + i * TOOTH;
    if (tx > x0 + len + 0.5) break;
    const clamp = Math.min(tx, x0 + len);
    d += `<line x1="${clamp}" y1="${y}" x2="${clamp}" y2="${yi}" stroke="#1a1a1a" stroke-width="${SW}"/>`;
  }
  return d;
}

// ─── COTAS ───────────────────────────────────────────────────────────────────
const TK = 5; // tamanho do tick

function cotaHoriz(x1, x2, y, label, color='#333', fs=9.5, bold=true) {
  const mx = (x1+x2)/2;
  return `
    <line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${color}" stroke-width="0.85"
      marker-start="url(#arrR)" marker-end="url(#arr)"/>
    <line x1="${x1}" y1="${y-TK}" x2="${x1}" y2="${y+TK}" stroke="${color}" stroke-width="0.85"/>
    <line x1="${x2}" y1="${y-TK}" x2="${x2}" y2="${y+TK}" stroke="${color}" stroke-width="0.85"/>
    <rect x="${mx-26}" y="${y-7}" width="52" height="13" fill="white"/>
    <text x="${mx}" y="${y+4.5}" text-anchor="middle" font-size="${fs}" fill="${color}"
      font-weight="${bold?'500':'400'}">${label}</text>`;
}

function cotaVert(y1, y2, x, label, color='#333', fs=9.5, bold=false) {
  const my = (y1+y2)/2;
  return `
    <line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="${color}" stroke-width="0.85"
      marker-start="url(#arrR)" marker-end="url(#arr)"/>
    <line x1="${x-TK}" y1="${y1}" x2="${x+TK}" y2="${y1}" stroke="${color}" stroke-width="0.85"/>
    <line x1="${x-TK}" y1="${y2}" x2="${x+TK}" y2="${y2}" stroke="${color}" stroke-width="0.85"/>
    <rect x="${x-27}" y="${my-7}" width="54" height="13" fill="white"/>
    <text x="${x}" y="${my+4.5}" text-anchor="middle" font-size="${fs}" fill="${color}"
      font-weight="${bold?'500':'400'}">${label}</text>`;
}

// Cota ao longo de uma linha diagonal com setas e label rotacionado no meio
function cotaDiagonal(x1, y1, x2, y2, mx, my, rot, tk_dx, tk_dy, label, color='#333', fs=9.5) {
  return `
    <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="0.85"
      marker-start="url(#arrR)" marker-end="url(#arr)"/>
    <line x1="${x1-tk_dx}" y1="${y1-tk_dy}" x2="${x1+tk_dx}" y2="${y1+tk_dy}" stroke="${color}" stroke-width="0.85"/>
    <line x1="${x2-tk_dx}" y1="${y2-tk_dy}" x2="${x2+tk_dx}" y2="${y2+tk_dy}" stroke="${color}" stroke-width="0.85"/>
    <rect x="${mx-18}" y="${my-7}" width="36" height="13" fill="white"
      transform="rotate(${rot},${mx},${my})"/>
    <text x="${mx}" y="${my+4}" text-anchor="middle" font-size="${fs}" fill="${color}" font-weight="500"
      transform="rotate(${rot},${mx},${my})">${label}</text>`;
}

// ─── EXPORTAR SVG ────────────────────────────────────────────────────────────
function baixarSVG() {
  const svgEl = document.querySelector('#svg-container svg');
  if (!svgEl) return;
  const ref = document.getElementById('ref').value || 'bolsa';
  const L   = document.getElementById('largura').value;
  const H   = document.getElementById('altura').value;
  const blob = new Blob([svgEl.outerHTML], { type: 'image/svg+xml' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `ficha_${ref}_${L}x${H}cm.svg`; a.click();
  URL.revokeObjectURL(url);
}

// ─── EXPORTAR PDF ────────────────────────────────────────────────────────────
async function baixarPDF() {
  const svgEl = document.querySelector('#svg-container svg');
  if (!svgEl) { alert('Gere o desenho antes de exportar.'); return; }

  const btn = document.getElementById('btn-pdf');
  btn.textContent = '⏳ Gerando…';
  btn.disabled = true;

  try {
    const { jsPDF } = window.jspdf;

    // Dimensões em px do viewBox
    const vb    = svgEl.viewBox.baseVal;
    const pxW   = vb.width;
    const pxH   = vb.height;

    // Dimensões físicas em mm (atributos width/height do SVG já estão em mm)
    const wMM = parseFloat(svgEl.getAttribute('width'));
    const hMM = parseFloat(svgEl.getAttribute('height'));

    // Serializa o SVG para uma string e cria Blob URL
    const svgData = new XMLSerializer().serializeToString(svgEl);
    const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const url     = URL.createObjectURL(svgBlob);

    // Renderiza numa canvas em alta resolução (2x para nitidez)
    const scale  = 2;
    const canvas = document.createElement('canvas');
    canvas.width  = pxW * scale;
    canvas.height = pxH * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);

    await new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => { ctx.drawImage(img, 0, 0, pxW, pxH); resolve(); };
      img.onerror = reject;
      img.src = url;
    });
    URL.revokeObjectURL(url);

    const imgData = canvas.toDataURL('image/png');

    // Cria PDF com exatamente o tamanho físico do SVG
    const orientation = wMM > hMM ? 'landscape' : 'portrait';
    const pdf = new jsPDF({ orientation, unit: 'mm', format: [wMM, hMM] });
    pdf.addImage(imgData, 'PNG', 0, 0, wMM, hMM);

    const ref = document.getElementById('ref').value || 'bolsa';
    const L   = document.getElementById('largura').value;
    const H   = document.getElementById('altura').value;
    pdf.save(`ficha_${ref}_${L}x${H}cm.pdf`);

  } catch (e) {
    console.error('Erro PDF:', e);
    alert('Erro ao gerar PDF: ' + e.message);
  } finally {
    btn.textContent = '↓ Exportar PDF';
    btn.disabled = false;
  }
}

// ─── LIVE UPDATE ─────────────────────────────────────────────────────────────
document.querySelectorAll('input').forEach(el => {
  el.addEventListener('change', gerarSVG);
  el.addEventListener('input',  gerarSVG);
});

gerarSVG();
</script>
